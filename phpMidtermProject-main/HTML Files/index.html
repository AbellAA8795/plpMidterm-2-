<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS_Files/style.css">
    <script src="https://kit.fontawesome.com/058a85c92d.js" crossorigin="anonymous"></script>
    <title>Login Page</title>
</head>
<body>
    <div class="login-page" id="jsLogin">
        <div class="header-label">
            <h2>Welcome Back</h2>
            <h1>Login to your account</h1>

            <h5 style="margin-top: 20px;" id="jsLoginError"></h5>
        </div>
            
        <form class="login-form" action="" >
            <label for="">Email</label><i class="fa-solid fa-envelope email"></i>
            <input type="text" name="" id="jsEmail" class="jsDesignEmail" placeholder="Email"  >
            <label for="">Password</label><i class="fa-solid fa-lock password"></i>
            <input type="password" name="" id="jsPassword" class="jsDesignPassword" placeholder="Password" >

            <input type="submit" value="Login" onclick="verifyInput(event)">
        </form>

        <p>Don't have an account?<br><a style="cursor: pointer; color: rgb(0, 119, 255);" onclick="toRegister(true)">Click Here</a></p>

    </div>

    <div class="registration-page" id="jsRegister">
        <h1>Register Account</h1>

        <form action="" onsubmit="passwordConfirmation(event)">
            <label for="">Username</label>
            <i class="fa-solid fa-circle-user ic"></i>
            <input type="text" placeholder="Username" id="jsName">
            
            <label for="">Email</label>
            <i class="fa-solid fa-envelope ic"></i>
            <input type="text" placeholder="Email">
            
            <label for="">Password <span class="regErrorPassword"></span></label>
            <i class="fa-solid fa-lock ic"></i>
            <i class="fa-solid fa-eye eye eye1"></i>
            <input type="password" placeholder="Password" id="jsRegPassword" class="jsDesPassword">
            
            <label for="">Confirm Password<span class="regErrorConfirmPassword"></span></label>
            <i class="fa-solid fa-lock ic"></i>
            <i class="fa-solid fa-eye eye"></i>
            <input type="password" placeholder="Confirm Password" id="jsRegConfirmPassword" class="jsDesConPassword">

            <input type="submit" value="Register" >
        </form>
        
        <p>Already have an account?<br><a style="cursor: pointer; color: rgb(0, 119, 255);" onclick="toLogin(true)">Go Back</a></p>

    </div>


    <script src="../JavaScript/design.js"></script>
</body>
</html>
